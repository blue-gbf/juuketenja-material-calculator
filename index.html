// =====================================================
// 保存・復元
// =====================================================
function save(name, obj){
  localStorage.setItem("sage_" + name, JSON.stringify(obj));
}

function load(name){
  return JSON.parse(localStorage.getItem("sage_" + name) || "{}");
}

// =====================================================
// 素材合算
// =====================================================
function merge(target, source){
  if(!source) return;
  for(let k in source){
    target[k] = (target[k] || 0) + source[k];
  }
}

// =====================================================
// 一覧
// =====================================================
function render(){
  const select = document.getElementById("sageSelect");

  Object.keys(data["賢者必要素材リスト"]).forEach(name=>{
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}
function openSelected(){
  const name =
    document.getElementById("sageSelect").value;

  open(name);
}
// =====================================================
// モーダル
// =====================================================
function open(name){
 localStorage.setItem("currentSage", name);
  const char = data["賢者必要素材リスト"][name];
  const saved = load(name);

  let inputs = "";

const materials = sageMaterials[name];


materials.forEach(material => {
  inputs += `
    <div>
      ${material}：
      <input type="number" id="own_${material}" value="${saved[material] || 0}">
    </div>
  `;
});
  document.getElementById("content").innerHTML = `
<h3>進捗設定</h3>

<div>
  取得済み：
  <input type="checkbox" id="acquired">
</div>

<div>
  礎武器段階：
  <select id="weaponStep">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</div>

<div>
  領域段階：
  <select id="domainStep">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
</div>
    <h2>${name}</h2>
<img
  src="${k}.png"
  style="width:220px;height:126px;border-radius:8px;"
>

    <h3>所持素材（アーカルムのみ）</h3>
    ${inputs}

    <button onclick="calc('${name}')">計算</button>

    <div id="result" style="margin-top:15px;"></div>
  `;
 document.getElementById("acquired").checked = saved.acquired || false;
 document.getElementById("weaponStep").value = saved.weaponStep || 0;
 document.getElementById("domainStep").value = saved.domainStep || 0;

}
const displayOrder = [

  "世界のイデア"
];

// =====================================================
// 計算（ここが本体）
// =====================================================
function calc(name){

  const char = data["賢者必要素材リスト"][name];

  let need = {};

  const acquired = document.getElementById("acquired").checked;
  const weaponStep = Number(document.getElementById("weaponStep").value);
  const domainStep = Number(document.getElementById("domainStep").value);

  if(!acquired){
    merge(need, char.join);
  }

  for(let i in char.weapon){
    if (!/^\d+$/.test(i)) continue;
    if (Number(i) > weaponStep) {
      merge(need, char.weapon[i]);
    }
  }

  for(let i in char.domain){
    if(Number(i) > domainStep){
      merge(need, char.domain[i]);
    }
  }

  merge(need, char.final);
  merge(need, char.ability4);

  // 所持素材
  let owned = {};
  const materials = sageMaterials[name];

  materials.forEach(material => {
    owned[material] = Number(
      document.getElementById("own_" + material).value || 0
    );
  });

  save(name,{
    ...owned,
    acquired,
    weaponStep,
    domainStep
  });

  // 表示順ロジック
  const needKeys = [
    ...displayOrder.filter(k => need[k]),
    ...Object.keys(need).filter(k => !displayOrder.includes(k))
  ];

  let result = [];

  for(let k of needKeys){
    let val = need[k];
    val -= owned[k] || 0;

    if(val > 0){
      const farm = farmMap[name]?.[k];
      let detail = "";
      const id = "farm_" + k.replace(/[^a-zA-Z0-9]/g, '_');

      if(farm){
        detail = `<b>おすすめ周回</b><br>`;
        farm.spots.forEach(rawSpot => {
          let cleanSpot = rawSpot
            .replace(/（.*）/g, '')
            .replace(/\(.*\)/g, '')
            .replace(/\s+/g, ' ')
            .trim();
          const url = battleUrlMap[cleanSpot] || "#";
          detail += `・<a href="${url}" target="_blank" style="color:#0066cc;text-decoration:underline;">${rawSpot}</a><br>`;
        });
        detail += `<br>${farm.note || ""}`;
      } else {
        detail = "周回情報なし";
      }

      result.push(`
        <li style="margin-bottom:12px;list-style:none;">
          <div onclick="toggleFarm('${id}')" style="display:flex;align-items:center;cursor:pointer;">
            <img src="${k}.png" style="width:56px;height:32px;margin-right:8px;">
            <span>${k} ×${val}</span>
          </div>
          <div id="${id}" style="display:none;margin-left:64px;margin-top:6px;padding:8px;background:#f5f5f5;border-radius:6px;">
            ${detail}
          </div>
        </li>
      `);
    }
  }

  document.getElementById("result").innerHTML =
    result.length ? `<ul>${result.join("")}</ul>` : "不足なし";
}
// =====================================================
function toggleFarm(id){
  const el = document.getElementById(id);
  if(el.style.display === "block"){
    el.style.display = "none";
  }else{
    el.style.display = "block";
  }
}

window.onclick = e=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
};

render();

const current = localStorage.getItem("currentSage");

if(current){
  document.getElementById("sageSelect").value = current;
  open(current);
}

</script>
